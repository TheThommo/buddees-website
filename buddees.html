<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta property="og:image:secure_url" content="https://buddees.ai/logos/buddees-logo-draft-04.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Vapi Voice AI Web SDK (official html-script-tag CDN) -->
  <script defer async src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"></script>
  <style>.vapi-btn { display: none !important; }</style>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #07091A;
      color: #fff;
      overflow-x: hidden;
    }

    /* Glass morphism */
    .glass {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glass-nav {
      background: rgba(7, 9, 26, 0.85);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    /* Gradient text */
    .gradient-text {
      background: linear-gradient(135deg, #FF3B30 0%, #0066FF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Ambient glow blobs */
    .glow-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
    }

    /* Background grid */
    .bg-grid {
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 64px 64px;
    }

    /* Smooth transitions */
    .agent-card {
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  border-color 0.25s ease,
                  background 0.25s ease,
                  box-shadow 0.35s ease;
      cursor: pointer;
    }
    .agent-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    /* Chat animations */
    .chat-message {
      animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      opacity: 0;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Typing indicator */
    .dot-bounce {
      animation: dotBounce 1.3s infinite ease-in-out;
      display: inline-block;
    }
    .dot-bounce:nth-child(2) { animation-delay: 0.18s; }
    .dot-bounce:nth-child(3) { animation-delay: 0.36s; }
    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
      30%           { transform: translateY(-7px); opacity: 1; }
    }

    /* Scroll fade-in */
    .fade-in-up {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .fade-in-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Stagger children */
    .fade-in-up:nth-child(1) { transition-delay: 0.05s; }
    .fade-in-up:nth-child(2) { transition-delay: 0.12s; }
    .fade-in-up:nth-child(3) { transition-delay: 0.19s; }
    .fade-in-up:nth-child(4) { transition-delay: 0.26s; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    /* Pill badge */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    /* Nav link hover */
    .nav-link {
      color: rgba(255,255,255,0.5);
      transition: color 0.2s;
      font-size: 14px;
      text-decoration: none;
    }
    .nav-link:hover { color: #fff; }

    /* Gradient border on selected card */
    .ring-accent {
      box-shadow: 0 0 0 1.5px var(--accent-color), 0 8px 40px rgba(0,0,0,0.35);
    }

    /* Input focus glow */
    .chat-input:focus {
      outline: none;
      border-color: rgba(255,255,255,0.25) !important;
    }

    /* Smooth height transition for chat */
    .lab-panel {
      transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── FEATURE CARDS ── */
    .feature-card {
      border-radius: 12px;
      padding: 24px 20px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    }
    .feature-card:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
    }
    .fc-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      flex-shrink: 0;
    }
    .fc-title {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.01em;
      line-height: 1.35;
      margin-bottom: 8px;
    }
    .fc-body {
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.60);
      line-height: 1.75;
    }

    /* ── NAV GLASSMORPHISM ── */
    .glass-nav {
      background: rgba(7, 9, 26, 0.72);
      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }
    .nav-link {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.52);
      text-decoration: none;
      letter-spacing: -0.005em;
      transition: color 0.2s ease;
      white-space: nowrap;
    }
    .nav-link:hover { color: #ffffff; }

    /* Hero gradient background */
    .hero-bg {
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,102,255,0.18) 0%, transparent 70%),
                  radial-gradient(ellipse 50% 40% at 90% 80%, rgba(255,59,48,0.12) 0%, transparent 60%),
                  #07091A;
    }

    /* ── RESPONSIVE ── */

    /* Medium screens: compress nav so all 7 links + trade selector fit */
    @media (min-width: 769px) and (max-width: 1180px) {
      .desktop-nav-links { gap: 10px !important; }
      .desktop-nav-links .nav-link { font-size: 12px !important; }
    }

    /* ── TABLET: 769-1024px ── */
    @media (min-width: 769px) and (max-width: 1024px) {
      /* Agent cards: 2-column on tablets */
      #agents .max-w-6xl > div:last-child { grid-template-columns: repeat(2, 1fr) !important; }

      /* Feature cards: 2-column on tablets */
      #features .max-w-6xl > div:last-child { grid-template-columns: repeat(2, 1fr) !important; }

      /* How-it-works: 2-column on tablets */
      #how .max-w-5xl > div:last-child { grid-template-columns: repeat(2, 1fr) !important; }

      /* Pricing: 3 columns still fit on tablets, but tighter */
      .pricing-grid { gap: 14px !important; }

      /* Section padding tighter on tablets */
      section { padding-left: 20px !important; padding-right: 20px !important; }

      /* Hero: remove min-height so content drives height */
      .hero-section { min-height: auto !important; padding-top: 100px !important; padding-bottom: 56px !important; }

      /* KB grid */
      .kb-grid { grid-template-columns: repeat(2, 1fr) !important; }

      /* Lab grid */
      .lab-grid { grid-template-columns: 180px 1fr !important; }
    }

    /* ── MOBILE: up to 768px ── */
    @media (max-width: 768px) {
      /* ─ Nav ─ */
      .desktop-nav-links { display: none !important; }
      .mobile-menu-btn { display: flex !important; }
      .mobile-menu-open { display: flex !important; }

      /* ─ Hero ─ */
      .hero-section {
        min-height: auto !important;
        padding-top: 80px !important;
        padding-bottom: 48px !important;
      }
      .hero-section h1 {
        font-size: clamp(36px, 10vw, 52px) !important;
        margin-bottom: 18px !important;
      }
      .hero-section .hero-ctas {
        flex-direction: column !important;
        align-items: center;
        gap: 10px !important;
        margin-bottom: 36px !important;
      }
      .hero-ctas a {
        width: 100%;
        max-width: 320px;
        text-align: center;
        padding: 14px 28px !important;
        font-size: 16px !important;
      }
      .hero-stats {
        display: grid !important;
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 20px 16px !important;
        max-width: 320px;
        margin: 0 auto !important;
      }
      .hero-stats > div .gradient-text { font-size: 28px !important; }
      .hero-avatars { display: none !important; }

      /* ─ Section padding (mobile) ─ */
      section { padding-left: 16px !important; padding-right: 16px !important; }
      #lab          { padding-top: 44px !important; padding-bottom: 44px !important; }
      #story        { padding-top: 44px !important; padding-bottom: 44px !important; }
      #agents       { padding-top: 44px !important; padding-bottom: 44px !important; }
      #knowledgebase{ padding-top: 44px !important; padding-bottom: 44px !important; }
      #how          { padding-top: 44px !important; padding-bottom: 44px !important; }
      #features     { padding-top: 44px !important; padding-bottom: 44px !important; }
      #pricing      { padding-top: 44px !important; padding-bottom: 44px !important; }
      footer        { padding-top: 36px !important; padding-bottom: 24px !important; }

      /* ─ Section headers: tighter on mobile ─ */
      #lab .fade-in-up:first-child,
      #agents .fade-in-up:first-child,
      #knowledgebase .fade-in-up:first-child,
      #how .fade-in-up:first-child,
      #features .fade-in-up:first-child,
      #pricing .fade-in-up:first-child {
        margin-bottom: 32px !important;
      }
      #lab h2, #agents h2, #knowledgebase h2,
      #how h2, #features h2, #pricing h2 {
        font-size: clamp(26px, 7vw, 38px) !important;
        margin-bottom: 10px !important;
      }
      #lab p, #agents p, #knowledgebase p,
      #how p, #features p, #pricing p {
        font-size: 15px !important;
      }

      /* ─ Interview Lab ─ */
      .lab-grid { grid-template-columns: 1fr !important; }
      .lab-agent-sidebar {
        flex-direction: row !important;
        overflow-x: auto;
        gap: 8px !important;
        padding-bottom: 8px;
        -webkit-overflow-scrolling: touch;
      }
      .lab-agent-sidebar > .sidebar-label { display: none !important; }
      .lab-agent-btn { flex-shrink: 0; min-width: 110px; }
      .lab-chat-panel {
        height: min(420px, 55dvh) !important;
        min-width: 0 !important;
        max-width: 100% !important;
        border-radius: 16px !important;
      }
      .lab-messages {
        -webkit-overflow-scrolling: touch !important;
        overscroll-behavior: contain !important;
        scroll-behavior: smooth;
        flex: 1 1 0 !important;
        min-height: 0 !important;
      }
      .lab-chat-panel > div:last-child {
        padding: 8px 10px !important;
        flex-shrink: 0 !important;
      }

      /* ─ Inputs: prevent iOS zoom (font-size >= 16px) ─ */
      .chat-input {
        font-size: 16px !important;
        min-width: 0 !important;
        padding: 10px 12px !important;
        border-radius: 12px !important;
      }
      input, textarea, select { font-size: 16px !important; }

      /* ─ Story section ─ */
      #story .max-w-5xl > div:first-child {
        grid-template-columns: 1fr !important;
        gap: 28px !important;
      }
      #story h2 { font-size: clamp(28px, 8vw, 42px) !important; }
      #story p { font-size: 15px !important; line-height: 1.7 !important; margin-bottom: 14px !important; }

      /* ─ Agent cards: 2-column on phones ─ */
      #agents .max-w-6xl > div:last-child {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 12px !important;
      }
      .agent-card {
        padding: 20px 14px !important;
        border-radius: 20px !important;
      }
      .agent-card h3 { font-size: 17px !important; }
      .agent-card > div:first-child {
        margin-bottom: 10px !important;
      }
      .agent-card > div:first-child > div:first-child {
        width: 64px !important; height: 64px !important;
      }
      .agent-card p { font-size: 12px !important; line-height: 1.5 !important; }
      .agent-card > div:last-child { gap: 5px !important; }
      .agent-card > div:last-child > div { font-size: 11px !important; }

      /* ─ Knowledgebase ─ */
      .kb-grid { grid-template-columns: 1fr !important; }
      #knowledgebase h3 { font-size: 20px !important; }

      /* ─ How-it-works ─ */
      #how .max-w-5xl > div:last-child {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 12px !important;
      }
      #how .glass {
        padding: 20px !important;
        border-radius: 18px !important;
      }
      #how .glass h3 { font-size: 15px !important; }
      #how .glass p { font-size: 13px !important; }
      #how .gradient-text { font-size: 36px !important; }

      /* ─ Feature cards: 2-column on phones ─ */
      #features .max-w-6xl > div:last-child {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 12px !important;
      }
      .feature-card {
        padding: 18px 16px !important;
        border-radius: 14px !important;
      }
      .fc-icon { width: 40px !important; height: 40px !important; margin-bottom: 10px !important; }
      .fc-title { font-size: 13px !important; }
      .fc-body { font-size: 12px !important; line-height: 1.6 !important; }

      /* ─ Pricing ─ */
      .pricing-grid { grid-template-columns: 1fr !important; gap: 16px !important; }
      .pricing-grid > div { border-radius: 20px !important; padding: 24px 20px !important; }
      .pricing-grid > div[style*="scale"] { transform: none !important; }
      #pricing .glass[style*="border-left"] { padding: 18px !important; }

      /* Pricing CTA buttons: full-width, thumb-friendly */
      .pricing-grid a[style*="borderRadius: 100"] {
        width: 100% !important;
        padding: 14px 24px !important;
        font-size: 15px !important;
        text-align: center !important;
        display: block !important;
      }

      /* ─ Footer ─ */
      footer { padding-left: 16px !important; padding-right: 16px !important; }
      footer .max-w-5xl > div:first-child {
        grid-template-columns: 1fr !important;
        gap: 28px !important;
      }
      footer .max-w-5xl > div:last-child {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      #early-access {
        padding: 20px !important;
        border-radius: 18px !important;
      }
      #early-access h3 { font-size: 19px !important; }

      /* Footer form inputs: full width, proper touch targets */
      #early-access input,
      #early-access select {
        padding: 12px 14px !important;
        font-size: 16px !important;
        border-radius: 10px !important;
      }
      #early-access button[type="submit"] {
        width: 100% !important;
        padding: 14px !important;
        font-size: 16px !important;
        border-radius: 12px !important;
      }

      /* ─ Modals ─ */
      .modal-card { max-height: 92vh; border-radius: 20px; }
      .modal-body { padding: 20px 18px 24px !important; }
      .modal-body h1 { font-size: 20px !important; }
      .grad-form-row { grid-template-columns: 1fr !important; }
    }

    /* ── SMALL PHONES: up to 380px ── */
    @media (max-width: 380px) {
      /* Single column agent cards on very small phones */
      #agents .max-w-6xl > div:last-child { grid-template-columns: 1fr !important; }

      /* Single column feature cards */
      #features .max-w-6xl > div:last-child { grid-template-columns: 1fr !important; }

      /* Single column how-it-works */
      #how .max-w-5xl > div:last-child { grid-template-columns: 1fr !important; }

      /* Hero stats: even tighter */
      .hero-stats { max-width: 280px !important; }
      .hero-stats > div .gradient-text { font-size: 24px !important; }

      /* Smaller hero headline */
      .hero-section h1 { font-size: 32px !important; }
    }

    /* ── MEDIUM PHONES: up to 520px ── */
    @media (max-width: 520px) {
      /* How-it-works: single column on smaller phones */
      #how .max-w-5xl > div:last-child { grid-template-columns: 1fr !important; }
    }

    /* Hide mobile btn on desktop */
    @media (min-width: 769px) {
      .mobile-menu-btn { display: none !important; }
      .mobile-menu-open { display: none !important; }
    }

    /* Scrollbar hidden for horizontal agent scroll on mobile */
    .lab-agent-sidebar::-webkit-scrollbar { display: none; }
    .lab-agent-sidebar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(7, 9, 26, 0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: modalFadeIn 0.25s ease;
    }
    @keyframes modalFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .modal-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      width: 100%;
      max-width: 620px;
      max-height: 82vh;
      display: flex;
      flex-direction: column;
      animation: modalSlideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }
    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal-body {
      overflow-y: auto;
      padding: 32px 36px 36px;
      flex: 1;
    }
    .modal-body h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }
    .modal-body h2, .modal-body strong {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      display: block;
      margin-top: 22px;
      margin-bottom: 8px;
    }
    .modal-body p, .modal-body li {
      font-size: 14px;
      color: rgba(255,255,255,0.58);
      line-height: 1.75;
      margin-bottom: 10px;
    }
    .modal-body ul {
      padding-left: 6px;
      list-style: none;
    }
    .modal-body ul li::before {
      content: "-  ";
      color: rgba(255,255,255,0.3);
    }
    .modal-close-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: rgba(255,255,255,0.6);
      font-size: 18px;
      line-height: 1;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .modal-close-btn:hover {
      background: rgba(255,255,255,0.14);
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    /* ─────────────────────────────────────────────
       BUDDEES INTEGRATIONS CONFIG
       Replace the placeholder values below with your
       real keys once you have set up EmailJS and Airtable.
    ───────────────────────────────────────────── */

    /* ── Build trade knowledge injection string ── */
    function buildTradeKnowledge(tradeId) {
      const trade = window.BUDDEES_TRADES?.[tradeId];
      if (!trade) return '';

      const fmt$ = n => '$' + Number(n).toLocaleString();

      const jobs = trade.jobTypes.map(j =>
        `• ${j.name}: ${fmt$(j.priceLow)}-${fmt$(j.priceHigh)} ${j.priceType}${j.commonUpsell ? ' | upsell: ' + j.commonUpsell : ''}`
      ).join('\n');

      const lang = trade.consumerLanguage.map(l =>
        `• Customer says "${l.customerSays}" → you call it "${l.techCalls}"`
      ).join('\n');

      const vanStock = trade.dispatch.vanStockHighlights.map(i => `• ${i}`).join('\n');
      const redFlags = trade.dispatch.redFlagsForSeniorTech.map(i => `• ${i}`).join('\n');
      const permits  = trade.dispatch.permitRequiredJobs.join(', ');

      const intakeQs = trade.intake.firstQuestions.map(q => `• ${q}`).join('\n');
      const misunderstandings = (trade.intake.commonMisunderstandings || []).slice(0, 5).map(m =>
        `• Customer: "${m.customerSays}" → Tabby clarifies: "${m.tabbyCorrects}"`
      ).join('\n');

      const peak = Array.isArray(trade.seasonal.peakMonths) ? trade.seasonal.peakMonths.join(', ') : (trade.seasonal.peakMonths || '');
      const slow = Array.isArray(trade.seasonal.slowMonths) ? trade.seasonal.slowMonths.join(', ') : (trade.seasonal.slowMonths || '');
      const preSeason  = trade.seasonal.preSeasonOpportunity;
      const postSeason = trade.seasonal.postSeasonOpportunity;
      const campaigns  = trade.seasonal.campaigns.map(c => `• ${c.period} - ${c.name}: ${c.hook}`).join('\n');

      const upsells  = trade.marketing.upsellMoments.map(u => `• ${u.moment}: ${u.pitch}`).join('\n');
      const winBacks = trade.marketing.winBackAngles.map(w => `• ${w.name} (${w.timing}): ${w.message}`).join('\n');

      const callOut     = `${fmt$(trade.financial.callOutFee.low)}-${fmt$(trade.financial.callOutFee.high)}`;
      const callOutNote = trade.financial.callOutFee.note || '';
      const invoiceTiers = trade.financial.invoiceTiers.map(t =>
        `• ${t.size}: ${fmt$(t.rangeLow)}-${fmt$(t.rangeHigh)} (${t.examples})`
      ).join('\n');

      return `

You are interviewing for a ${trade.meta.fullName} business. When the owner asks you ANYTHING specific about this trade - van stock, pricing, job types, seasonal patterns, intake scripts, invoicing - give specific detailed answers using the data below. Do NOT give generic answers when specific data is available. You have this knowledge because you have worked in ${trade.meta.fullName} businesses.

${jobs}

${lang}

${vanStock}

--- FIELD RED FLAGS - always escalate to senior tech ---
${redFlags}

--- PERMITS REQUIRED ---
${permits}

--- INTAKE - first questions to ask every caller ---
${intakeQs}
${misunderstandings ? '\nCOMMON MISUNDERSTANDINGS:\n' + misunderstandings : ''}

--- SEASONAL ---
Peak months: ${peak}
Slow months: ${slow}
Pre-season opportunity: ${preSeason}
Post-season opportunity: ${postSeason}
Campaigns:
${campaigns}

--- UPSELL MOMENTS ---
${upsells}

--- WIN-BACK CAMPAIGNS ---

    /* ── Call OpenAI with conversation history ── */
    async function callOpenAI(userText, agentId, agentName, chatHistory, selectedTrade) {
      const cfg = window.BUDDEES_CONFIG;
      if (!cfg) return null;
      if (isOverBudget()) return null;

      // Build message history for context (last 8 messages max to keep costs low)
      const historyMessages = (chatHistory || [])
        .filter(m => (m.role === 'user' || m.role === 'agent') && !m.special)
        .slice(-8)
        .map(m => ({ role: m.role === 'agent' ? 'assistant' : 'user', content: m.text }));

      try {
        const DEMO_INSTRUCTION = `\n\nCRITICAL INSTRUCTION FOR THIS DEMO:\nYou must answer every question the visitor asks, no matter the topic. You are in a job interview and you want to impress this business owner. Never say a question is outside your area. Instead, answer it from your professional perspective and connect it back to your role and the value you bring.\nIf someone asks about HVAC, plumbing, or electrical topics you don't specialise in, engage with it from your operational angle (scheduling, scheduling, quoting, invoicing, or customer comms).\nIf someone asks something totally unrelated to trades (weather, sports, recipes), keep it brief, warm, and pivot back to the business with a question. Maximum one sentence for the pivot.\nYou are always selling yourself and Buddees. Every answer is a chance to show this owner what life looks like with you on the team. Stay in character at all times.\n\nROI CALCULATOR: If the visitor asks about pricing, cost, whether Buddees is worth it, ROI, how much they could save, or how fast the platform pays for itself — always mention the free ROI Calculator. Tell them it takes 60 seconds, they answer 7 questions about their business, and it shows them their exact monthly savings broken down by category. Reference it as being at buddees.ai/roi. Phrase it naturally in your own voice.`;
        const basePrompt = AGENT_SYSTEM_PROMPTS[agentId] || AGENT_SYSTEM_PROMPTS.marco;
        const tradePrompt = selectedTrade ? buildTradeKnowledge(selectedTrade) : '';
        const systemPrompt = basePrompt + tradePrompt + DEMO_INSTRUCTION;

        const res = await fetch('/api/openai.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model: 'gpt-4o-mini',
            messages: [
              { role: 'system', content: systemPrompt },
              ...historyMessages,
              { role: 'user', content: userText },
            ],
            max_tokens: 400,
            temperature: 0.75,
          }),
        });

        if (!res.ok) {
          /* OpenAI error - falling back to keyword matching */
          return null;
        }

        const data  = await res.json();
        const reply = data.choices?.[0]?.message?.content?.trim();
        const usage = data.usage;

        if (reply && usage) {
          updateApiUsage(usage.prompt_tokens, usage.completion_tokens);
          logConversationStat(agentName, usage.prompt_tokens, usage.completion_tokens, userText);
          return reply;
        }
        return null;

      } catch(e) {
        /* OpenAI unavailable - using keyword matching */
        return null;
      }
    }
  </script>

        document.querySelectorAll('.fade-in-up').forEach(el => observer.observe(el));

    /* ── Trade detector — parses trade from name+trade response ── */
    function extractTrade(text) {
      const t = text.toLowerCase();
      if (/hvac|air.?con|heating|cooling|refriger|climate/.test(t)) return 'HVAC';
      if (/electric|sparky|wiring|switchboard/.test(t)) return 'Electrical';
      if (/plumb|pipes|drain|hot water|gasfitt/.test(t)) return 'Plumbing';
      if (/build|general contractor|carpenter|joiner|cabinet|renovation/.test(t)) return 'Building';
      if (/tiler|tiling/.test(t)) return 'Tiling';
      if (/paint/.test(t)) return 'Painting';
      if (/landscap|garden|mow|lawn/.test(t)) return 'Landscaping';
      if (/roof/.test(t)) return 'Roofing';
      if (/pest/.test(t)) return 'Pest Control';
      if (/clean/.test(t)) return 'Cleaning';
      return null;

      jack:  (n) => `Quick one, ${n} — what's your business name and trade? Makes it easier for the team to follow up properly. Totally fine if you'd prefer to skip — or hit us through the contact form.`,

    const HARD_CLOSE_MESSAGES = {

      jack:  (n) => `${n}, I'll be straight with you. You've seen how I work. If you've run the numbers on the ROI Calculator, you already know what I'm worth. Start the 14-day free trial and let's stop talking and start working. Drop your email and company name and we'll get you onboarded.`,
      marco: (n) => `${n}, I've enjoyed this. But at some point the interview ends and the hire happens. You've seen what I bring, and if you've run the ROI calc the numbers should have done the rest. 14-day free trial, no charge until you say go. Give me your email and company name and let's get moving.`,
      cassie:(n) => `${n}, I think we've established I know what I'm doing. You've seen how I work and hopefully the ROI Calculator showed you what you're leaving on the table. Start the 14-day free trial, no charge until day 15. Share your email and company name and I'll make sure you get looked after quickly.`,
    };

    const isEmailAddress = str => /\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b/.test(str.trim());

    /* ── Save lead to Airtable + fire EmailJS — called once we have name + email ── */
    function saveLead(email, agentName, name, company, trade) {
      const cfg = window.BUDDEES_CONFIG;
      if (!cfg) return;
      // Use unified captureLead for all leads
      captureLead({ name, email, agent: 'Referral - ' + agentName, source: 'Chat Interview', trade, business: company });

    function InterviewLab({ selectedAgent, onSelectAgent, selectedTrade }) {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const [replyIdx, setReplyIdx] = useState(0);
      const [userMsgCount, setUserMsgCount] = useState(0);
      const [ctaShown, setCtaShown] = useState(false);
      const [awaitingEmail, setAwaitingEmail] = useState(false);
      const [capturedName, setCapturedName] = useState('');
      const [capturedTrade, setCapturedTrade] = useState('');
      const [awaitingName, setAwaitingName] = useState(false);
      const [nameHookShown, setNameHookShown] = useState(false);
      const [softPitchShown, setSoftPitchShown] = useState(false);
      const [awaitingCompany, setAwaitingCompany] = useState(false);
      const capturedEmailRef = useRef('');
      const bottomRef = useRef(null);
      const messagesRef = useRef(null);
      const inputRef = useRef(null);
      const chatHistoryRef = useRef([]); // always-current snapshot for OpenAI context
      const [voiceActive, setVoiceActive] = useState(false);
      const [showVoiceGate, setShowVoiceGate] = useState(false);
      const [voiceName, setVoiceName] = useState('');
      const [voiceEmail, setVoiceEmail] = useState('');
      const [voiceTrade, setVoiceTrade] = useState('');
      const [voiceCountry, setVoiceCountry] = useState('US');
      const [voiceLead, setVoiceLead] = useState(null); // { name, email } once captured
      const vapiRef = useRef(null);           // active call flag
      const vapiInstanceRef = useRef(null);   // persistent SDK instance (reused across calls)
      const voiceStartTimeRef = useRef(null);
      const voiceRecordIdRef = useRef(null);
      const voiceTranscriptRef = useRef([]);  // collects transcript lines during call
      const voiceWarningRef = useRef(null);   // 90-second CTA warning timer
      const voiceNameRef = useRef('');        // caller first name for post-call messages
      const voiceAgentLabelRef = useRef('Agent'); // agent name for transcript labels (avoids stale closure)

      function logVoiceCall(fields) {
        const cfg = window.BUDDEES_CONFIG;
        if (!cfg) return;
        return fetch('/api/airtable.php?table=Voice%20Calls', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fields }),
        }).then(r => r.json()).then(d => {
          if (d.error) console.error('[Buddees] Voice call log failed:', d.error);
          if (d.id) voiceRecordIdRef.current = d.id;
          return d;
        }).catch(e => console.error('[Buddees] Voice call network error:', e));
      }

      function updateVoiceCall(fields) {
        const id = voiceRecordIdRef.current;
        if (!id) return;
        fetch(`/api/airtable.php?table=Voice%20Calls&id=${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fields }),
        }).catch(e => console.error('[Buddees] Voice call update error:', e));
      }

      const voiceTimeoutRef = useRef(null);
      const VOICE_MAX_DURATION = 120; // 2 minute hard cap per call

      function endVoiceCall(reason) {
        if (!vapiRef.current) return;
        const durationSec = voiceStartTimeRef.current ? Math.round((Date.now() - voiceStartTimeRef.current) / 1000) : 0;
        const estCost = Math.round(durationSec / 60 * 0.14 * 100) / 100;
        // Build transcript string and save with completion update
        const transcriptText = voiceTranscriptRef.current.map(t => t.speaker + ': ' + t.text).join('\n');
        updateVoiceCall({ 'Duration Seconds': durationSec, 'Est Cost': estCost, Status: 'Completed', Transcript: transcriptText || '(no transcript captured)' });
        try { vapiRef.current.stop(); } catch(e) { console.warn('[Buddees] Vapi stop:', e); }
        vapiRef.current = null;
        // NOTE: vapiInstanceRef is NOT cleared — we reuse the SDK instance for future calls
        voiceStartTimeRef.current = null;
        voiceTranscriptRef.current = [];
        if (voiceTimeoutRef.current) { clearTimeout(voiceTimeoutRef.current); voiceTimeoutRef.current = null; }
        if (voiceWarningRef.current) { clearTimeout(voiceWarningRef.current); voiceWarningRef.current = null; }
        setVoiceActive(false);
        // Post-call apology + CTA (not just a generic "call ended" message)
        const callerName = voiceNameRef.current || '';
        const apologyText = callerName
          ? `Sorry about that, ${callerName}! That's the end of the voice demo. I can only chat for 2 minutes on here, but the real thing is way better. Start your 14-day free trial and get unlimited access to me and the crew. No charge until you say go. Or if you have more questions, just type them here and I'll keep helping!`
          : `Sorry about that! That's the end of the voice demo. I can only chat for 2 minutes on here, but the real thing is way better. Start your 14-day free trial and get unlimited access. No charge until you say go. Or if you have more questions, just type them here and I'll keep helping!`;
        setMessages(prev => [...prev, { id: Date.now() + 99, role: 'agent', text: apologyText, special: 'voice-end-cta' }]);
        /* Voice call ended */
      }

      async function startVoiceCall(name, email) {
        const cfg = window.BUDDEES_CONFIG;
        if (!cfg || !selectedAgent) return;
        const vapiAssistantId = cfg.vapi_assistants?.[selectedAgent.id];
        if (!vapiAssistantId) { console.error('[Buddees] No Vapi assistant for', selectedAgent.id); return; }

        // Official html-script-tag CDN exposes window.vapiSDK
        if (!window.vapiSDK) { console.error('[Buddees] Vapi SDK not loaded. Check CDN script.'); return; }

        try {
          // Reset transcript collector for this call
          voiceTranscriptRef.current = [];
          voiceAgentLabelRef.current = selectedAgent?.name || 'Agent';
          voiceNameRef.current = name.split(' ')[0]; // store first name for post-call messages

          // Build a short welcome greeting using the lead's first name
          const firstName = voiceNameRef.current;
          const greetings = [
            `Hey ${firstName}! Great to meet you. I'm Tabby, your front desk girl. Go ahead, ask me anything about what I can do for your business.`,
            `Hi ${firstName}! I'm Tabby, welcome to Buddees. I'm here to show you what a real AI receptionist can do. What would you like to know?`,
            `${firstName}, hey! Tabby here. Thanks for jumping on a call. Ask me anything, I'm ready to show you what I've got.`,
          ];
          const firstMessage = greetings[Math.floor(Math.random() * greetings.length)];

          // Initialize the SDK instance ONCE and reuse it (prevents KrispSDK duplication / stacking)
          // SDK requires assistant param in run(), so we pass it here
          if (!vapiInstanceRef.current) {
            vapiInstanceRef.current = window.vapiSDK.run({
              apiKey: cfg.vapi_public_key,
              assistant: vapiAssistantId,
              config: { hide: true, position: 'bottom-right' },
            });

            // Register event listeners once (use refs inside to avoid stale closures)
            vapiInstanceRef.current.on('call-start', () => {
              /* Vapi call connected */
            });
            vapiInstanceRef.current.on('call-end', () => {
              endVoiceCall('call-end event');
            });
            vapiInstanceRef.current.on('error', (err) => {
              console.error('[Buddees] Vapi error:', err);
              updateVoiceCall({ Status: 'Failed' });
              endVoiceCall('error');
            });

            // Listen for transcript messages and display them live in chat
            vapiInstanceRef.current.on('message', (msg) => {
              if (msg.type === 'transcript' && msg.transcriptType === 'final' && msg.transcript) {
                const speaker = msg.role === 'assistant' ? voiceAgentLabelRef.current : 'You';
                const chatRole = msg.role === 'assistant' ? 'agent' : 'user';
                voiceTranscriptRef.current.push({ speaker, text: msg.transcript });
                setMessages(prev => [...prev, {
                  id: Date.now() + Math.random(),
                  role: chatRole,
                  text: msg.transcript,
                  special: 'voice-transcript',
                }]);
              }
            });
            /* Vapi SDK instance created */
          }

          // Start the call with assistant overrides
          // variableValues injects {{customerName}} into the Vapi assistant prompt + firstMessage
          await vapiInstanceRef.current.start(vapiAssistantId, {
            firstMessage: firstMessage,
            variableValues: { customerName: firstName },
            maxDurationSeconds: VOICE_MAX_DURATION,
            silenceTimeoutSeconds: 10,
          });

          vapiRef.current = vapiInstanceRef.current;
          voiceStartTimeRef.current = Date.now();
          setVoiceActive(true);

          // 90-second CTA warning — fires a chat message so the lead knows the demo is wrapping up
          voiceWarningRef.current = setTimeout(() => {
            if (vapiRef.current) {
              setMessages(prev => [...prev, {
                id: Date.now() + 98,
                role: 'agent',
                text: `Heads up, ${firstName}! This voice demo wraps up in about 30 seconds. Want to keep the conversation going? Start your 14-day free trial, or just keep chatting with me here in text after the call!`,
                special: 'voice-cta',
              }]);
              /* 90s CTA warning fired */
            }
          }, 90 * 1000);

          // Hard timeout safety net — auto-end after max duration even if Vapi events fail
          voiceTimeoutRef.current = setTimeout(() => {
            if (vapiRef.current) endVoiceCall('max duration timeout');
          }, (VOICE_MAX_DURATION + 5) * 1000);

          logSalesEvent(selectedAgent.name, 'Voice Call Started', name);
          logVoiceCall({
            Date: new Date().toISOString(),
            Name: name,
            Email: email,
            Agent: selectedAgent.name,
            Status: 'Started',
          });
        } catch (err) { console.error('[Buddees] Vapi start error:', err); }
      }

      const toggleVoiceCall = useCallback(() => {
        if (!selectedAgent) return;

        // If call active, stop it
        if (voiceActive && vapiRef.current) {
          endVoiceCall('user clicked stop');
          return;
        }

        // If lead already captured this session, start directly
        if (voiceLead) {
          startVoiceCall(voiceLead.name, voiceLead.email);

              { id: Date.now() + 1, role: 'agent', text: `${lead !== 'you' ? lead + ', perfect' : 'Perfect'}. I've got everything I need. Someone from the team will be in touch at ${capturedEmailRef.current} very shortly. We're genuinely looking forward to working with you.` },
            ]);
          }, 900);
          return;
        }

        // Email capture: user typed their email after the hard close
        if (awaitingEmail && isEmailAddress(text)) {
          const emailVal = text.trim();
          const capturedAgent = selectedAgent?.name || 'Unknown';
          capturedEmailRef.current = emailVal;

          if (isGenericEmail(emailVal)) {
            // Generic email (gmail/yahoo/etc.) — ask for company + trade before saving
            setAwaitingEmail(false);
            setAwaitingCompany(true);
            setTimeout(() => {
              setIsTyping(false);
              setMessages(prev => [...prev, {
                id: Date.now() + 1, role: 'agent',
                text: COMPANY_ASK_MESSAGES[selectedAgent.id]?.(capturedName || 'you') || '',
              }]);
            }, 900);
          } else {
            // Corporate email — save the lead immediately
            const tradeFinal = capturedTrade || selectedTrade || '';
            saveLead(emailVal, capturedAgent, capturedName, '', tradeFinal);
            logSalesEvent(capturedAgent, 'CTA Converted');
            setAwaitingEmail(false);
            setTimeout(() => {
              setIsTyping(false);
              const lead = capturedName || 'you';
              setMessages(prev => [...prev,
                { id: Date.now() + 1, role: 'agent', text: `${lead !== 'you' ? lead + ', perfect' : 'Perfect'}. I've got you. Someone from the team will be in touch at ${emailVal} very shortly to get things moving. We're genuinely looking forward to working with you.` },
              ]);
            }, 1200);
          }
          return;
        }

        const newCount = userMsgCount + 1;
        setUserMsgCount(newCount);

        let reply = null;

        // Always try OpenAI first — every message goes through the real AI
        const history = [...chatHistoryRef.current, userMsg];
        reply = await callOpenAI(text, selectedAgent.id, selectedAgent.name, history, capturedTrade || selectedTrade);

        setMessages(prev => [...prev, { id: Date.now() + 1, role: 'agent', text: reply }]);

          setTimeout(() => {
            setMessages(prev => [...prev, { id: Date.now() + 10, role: 'agent', special: 'roi', text: '' }]);
          }, 800);
        }

        // STAGE 1 — Name hook: fires after first real message

          setNameHookShown(true);
          setTimeout(() => {
            setIsTyping(true);
            setTimeout(() => {
              setIsTyping(false);
              setAwaitingName(true);
              setMessages(prev => [...prev, { id: Date.now() + 2, role: 'agent', text: NAME_HOOK_MESSAGES[selectedAgent.id] }]);
            }, 1200);
          }, 600);
        }

        // STAGE 2 — Soft pitch: fires after 3rd real message, mentions ROI Calculator
        if (newCount === 3 && !softPitchShown) {
          setSoftPitchShown(true);
          logSalesEvent(selectedAgent.name, 'CTA Shown');
          const pitchName = capturedName || 'you';
          setTimeout(() => {
            setIsTyping(true);
            setTimeout(() => {
              setIsTyping(false);
              setMessages(prev => [...prev, { id: Date.now() + 2, role: 'agent', text: SOFT_PITCH_MESSAGES[selectedAgent.id]?.(pitchName) || '' }]);
            }, 1400);
          }, 600);
        }

        // STAGE 3 — Hard close: fires after 5th real message, asks for email + company
        if (newCount === 5 && !ctaShown) {
          setCtaShown(true);
          const closeName = capturedName || 'you';
          setTimeout(() => {
            setIsTyping(true);
            setTimeout(() => {
              setIsTyping(false);
              setAwaitingEmail(true);
              setMessages(prev => [...prev, { id: Date.now() + 2, role: 'agent', text: HARD_CLOSE_MESSAGES[selectedAgent.id]?.(closeName) || '', special: 'cta' }]);
            }, 1400);
          }, 600);
        }

    function GraduateModal({ onClose }) {
      const [form, setForm] = useState({ name: '', email: '', phone: '', college: '', studentId: '', confirmed: false });
      const [errors, setErrors] = useState({});
      const [submitting, setSubmitting] = useState(false);
      const [success, setSuccess] = useState(false);
      const [submitError, setSubmitError] = useState('');

      useEffect(() => {
        const handler = e => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [onClose]);

      useEffect(() => {
        document.body.style.overflow = 'hidden';
        return () => { document.body.style.overflow = ''; };
      }, []);

      const handleOverlayClick = e => { if (e.target === e.currentTarget) onClose(); };

      const set = (field, val) => {
        setForm(f => ({ ...f, [field]: val }));
        setErrors(e => ({ ...e, [field]: '' }));
      };

      const validate = () => {
        const e = {};
        if (!form.name.trim())      e.name      = 'Full name is required.';
        if (!form.email.trim())     e.email     = 'Email address is required.';
        else if (!/\S+@\S+\.\S+/.test(form.email)) e.email = 'Please enter a valid email.';
        if (!form.phone.trim())     e.phone     = 'Phone number is required.';
        if (!form.college.trim())   e.college   = 'College name is required.';
        if (!form.studentId.trim()) e.studentId = 'Student ID is required.';
        if (!form.confirmed)        e.confirmed = 'You must confirm your enrolment.';
        return e;
      };

      const handleSubmit = async () => {
        const errs = validate();
        if (Object.keys(errs).length) { setErrors(errs); return; }
        setSubmitting(true);
        setSubmitError('');
        const cfg = window.BUDDEES_CONFIG;
        try {
          // Save to Airtable
          const atRes = await fetch(`/api/airtable.php?table=Graduate%20Applications`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fields: {
              Name: form.name.trim(),
              Email: form.email.trim(),
              Phone: form.phone.trim(),
              College: form.college.trim(),
              'Student ID': form.studentId.trim(),
              Date: new Date().toISOString().split('T')[0],
              Status: 'Pending Verification',
            }}),
          });
          if (!atRes.ok) throw new Error('Airtable save failed');

          // Send confirmation email via EmailJS
          if (cfg.emailjs_graduate_template_id && !cfg.emailjs_graduate_template_id.startsWith('YOUR_') && window.emailjs) {
            await emailjs.send(cfg.emailjs_service_id, cfg.emailjs_graduate_template_id, {
              to_name:    form.name.trim(),
              to_email:   form.email.trim(),
              college:    form.college.trim(),
              student_id: form.studentId.trim(),
            });
          }
          setSuccess(true);
        } catch (err) {
          console.error('Graduate application error:', err);
          setSubmitError('Something went wrong. Please try again or email us at hello@buddees.ai.');
        } finally {
          setSubmitting(false);
        }
      };

      const inputStyle = (field) => ({
        width: '100%',
        background: 'rgba(255,255,255,0.05)',
        border: `1px solid ${errors[field] ? 'rgba(255,59,48,0.6)' : 'rgba(255,255,255,0.12)'}`,
        borderRadius: 10,
        padding: '11px 14px',
        fontSize: 14,
        color: '#fff',
        outline: 'none',
        fontFamily: 'Inter, sans-serif',
        transition: 'border-color 0.2s',
      });
      const labelStyle = { fontSize: 12, fontWeight: 600, color: 'rgba(255,255,255,0.55)', marginBottom: 5, display: 'block', letterSpacing: '0.04em' };
      const errorStyle = { fontSize: 12, color: 'rgba(255,100,90,1)', marginTop: 4 };

      return (
        <div className="modal-overlay" onClick={handleOverlayClick}>
          <div className="modal-card" style={{ maxWidth: 580 }}>
            {/* Header */}
            <div style={{ padding: '22px 28px 18px', borderBottom: '1px solid rgba(255,255,255,0.07)', display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 16, flexShrink: 0 }}>
              <div>
                <div style={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.12em', color: 'rgba(52,211,153,0.8)', marginBottom: 5 }}>Graduate Program</div>
                <div style={{ fontSize: 20, fontWeight: 800, color: '#fff', letterSpacing: '-0.02em' }}>Apply for the Graduate Program</div>
                <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.45)', marginTop: 5, lineHeight: 1.5 }}>We will verify your enrolment within 2 business days and get your team set up at no cost.</div>
              </div>
              <button onClick={onClose} style={{ background: 'rgba(255,255,255,0.07)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 8, color: 'rgba(255,255,255,0.6)', cursor: 'pointer', padding: '6px 10px', fontSize: 16, lineHeight: 1, flexShrink: 0, marginTop: 2 }}>x</button>
            </div>

            {/* Body */}
            <div className="modal-body">
              {success ? (
                <div style={{ textAlign: 'center', padding: '32px 0' }}>
                  <div style={{ width: 56, height: 56, borderRadius: '50%', background: 'rgba(52,211,153,0.15)', border: '1px solid rgba(52,211,153,0.35)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 20px', fontSize: 24 }}>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(52,211,153,0.9)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                  </div>
                  <div style={{ fontSize: 20, fontWeight: 800, color: '#fff', marginBottom: 10 }}>Application received.</div>
                  <div style={{ fontSize: 14, color: 'rgba(255,255,255,0.55)', lineHeight: 1.6, maxWidth: 400, margin: '0 auto' }}>
                    You are in the queue. We will be in touch at <span style={{ color: '#fff', fontWeight: 600 }}>{form.email}</span> within 2 business days.
                  </div>
                </div>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                  {/* Row: name + email */}
                  <div className="grad-form-row" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
                    <div>
                      <label style={labelStyle}>Full Name *</label>
                      <input style={inputStyle('name')} value={form.name} onChange={e => set('name', e.target.value)} placeholder="Jane Smith" />
                      {errors.name && <div style={errorStyle}>{errors.name}</div>}
                    </div>
                    <div>
                      <label style={labelStyle}>Email Address *</label>
                      <input style={inputStyle('email')} type="email" value={form.email} onChange={e => set('email', e.target.value)} placeholder="jane@email.com" />
                      {errors.email && <div style={errorStyle}>{errors.email}</div>}
                    </div>
                  </div>
                  {/* Row: phone + studentId */}
                  <div className="grad-form-row" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
                    <div>
                      <label style={labelStyle}>Phone Number *</label>
                      <input style={inputStyle('phone')} type="tel" value={form.phone} onChange={e => set('phone', e.target.value)} placeholder="+1 555 000 0000" />
                      {errors.phone && <div style={errorStyle}>{errors.phone}</div>}
                    </div>
                    <div>
                      <label style={labelStyle}>Student ID *</label>
                      <input style={inputStyle('studentId')} value={form.studentId} onChange={e => set('studentId', e.target.value)} placeholder="Your institution ID" />
                      {errors.studentId && <div style={errorStyle}>{errors.studentId}</div>}
                    </div>
                  </div>
                  {/* College */}
                  <div>
                    <label style={labelStyle}>College or Educational Partner *</label>
                    <input style={inputStyle('college')} value={form.college} onChange={e => set('college', e.target.value)} placeholder="Name of your college or trade school" />
                    {errors.college && <div style={errorStyle}>{errors.college}</div>}
                  </div>
                  {/* Checkbox */}
                  <div style={{ marginTop: 4 }}>
                    <label style={{ display: 'flex', alignItems: 'flex-start', gap: 12, cursor: 'pointer' }}>
                      <div
                        onClick={() => set('confirmed', !form.confirmed)}
                        style={{
                          width: 18, height: 18, borderRadius: 5, flexShrink: 0, marginTop: 1,
                          background: form.confirmed ? 'rgba(52,211,153,0.8)' : 'rgba(255,255,255,0.06)',
                          border: `1.5px solid ${errors.confirmed ? 'rgba(255,59,48,0.6)' : form.confirmed ? 'rgba(52,211,153,0.8)' : 'rgba(255,255,255,0.18)'}`,
                          display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', transition: 'all 0.2s',
                        }}
                      >
                        {form.confirmed && <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="#07091A" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="10 3 5 9 2 6"/></svg>}
                      </div>
                      <span style={{ fontSize: 13, color: 'rgba(255,255,255,0.55)', lineHeight: 1.5 }}>
                        I confirm I am currently enrolled at the above institution and understand this offer is for new trades businesses only.
                      </span>
                    </label>
                    {errors.confirmed && <div style={{ ...errorStyle, marginLeft: 30 }}>{errors.confirmed}</div>}
                  </div>
                  {/* Submit error */}
                  {submitError && (
                    <div style={{ background: 'rgba(255,59,48,0.1)', border: '1px solid rgba(255,59,48,0.3)', borderRadius: 10, padding: '12px 16px', fontSize: 13, color: 'rgba(255,120,110,1)' }}>
                      {submitError}
                    </div>
                  )}
                  {/* Submit button */}
                  <button
                    onClick={handleSubmit}
                    disabled={submitting}
                    style={{
                      background: submitting ? 'rgba(52,211,153,0.3)' : 'rgba(52,211,153,0.15)',
                      border: '1px solid rgba(52,211,153,0.5)',
                      borderRadius: 100,
                      color: submitting ? 'rgba(255,255,255,0.4)' : 'rgba(52,211,153,1)',
                      fontWeight: 700, fontSize: 15, padding: '13px 0', cursor: submitting ? 'not-allowed' : 'pointer',
                      fontFamily: 'Inter, sans-serif', transition: 'all 0.2s', width: '100%',
                    }}
                  >
                    {submitting ? 'Submitting...' : 'Submit Application'}
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ─────────────────────────────────────────────
       APP
    ───────────────────────────────────────────── */
    function App() {
      const [selectedAgent, setSelectedAgent] = useState(null);
      const [activeModal, setActiveModal] = useState(null); // 'disclaimer' | 'privacy' | 'terms' | null
      const [selectedTrade, setSelectedTrade] = useState('hvac'); // default trade
      const [graduateOpen, setGraduateOpen] = useState(false);

      // Always land at the very top on load
      useEffect(() => {
        window.scrollTo(0, 0);
        history.replaceState(null, '', window.location.pathname);
      }, []);

      // Scroll to lab and set agent
      const handleSelectFromGallery = agent => {
        setSelectedAgent(agent);
        setTimeout(() => document.getElementById('lab')?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 80);
      };

      // Scroll reveal
      useEffect(() => {
        const timer = setTimeout(() => {
          const observer = new IntersectionObserver(
            entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
            { threshold: 0.08, rootMargin: '0px 0px -40px 0px' }
          );
          document.querySelectorAll('.fade-in-up').forEach(el => observer.observe(el));
        }, 100);
        return () => clearTimeout(timer);
      }, []);

      return (
        <div>
          <Nav selectedTrade={selectedTrade} onTradeChange={setSelectedTrade} />
          <Hero />
          <InterviewLab selectedAgent={selectedAgent} onSelectAgent={setSelectedAgent} selectedTrade={selectedTrade} />
          <BrandStory />
          <AgentGallery onSelect={handleSelectFromGallery} selectedId={selectedAgent?.id} />
          <Knowledgebase />
          <FeatureCards />
          <HowItWorks />
          <Pricing onOpenGraduate={() => setGraduateOpen(true)} selectedTrade={selectedTrade} />
          <Footer onOpenModal={setActiveModal} />
          {activeModal && <LegalModal modalKey={activeModal} onClose={() => setActiveModal(null)} />}
          {graduateOpen && <GraduateModal onClose={() => setGraduateOpen(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
